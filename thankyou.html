<!DOCTYPE html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <meta

      content="Relax, let us do the research and find you the best holiday."

    <!-- General css -->
    <link rel="stylesheet" href="css/general/reset.css">

  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="/" aria-label="One Stop Travel Shop, home">
          <img
            class="brand-logo"
            src="img/logo.png"
            width="220"
            height="80"
            alt="One Stop Travel Shop logo"
            loading="eager"
            decoding="async"
          />
        </a>

        <nav class="site-nav" aria-label="Primary">
          <a class="nav-text" href="/" aria-current="page">Home</a>
          <a class="nav-text" href="/about.html">About Us</a>
          <a class="nav-text" href="/holidays.html">Our Holidays</a>
          <a class="nav-text is-active" href="/contact.html">Contact Us</a>
        </nav>

        <svg class="mobile-menu-icon" onclick="toggleMobileMenu()" xmlns="http://www.w3.org/2000/svg" width="800px" height="800px" viewBox="0 0 24 24" fill="none">
          <path d="M4 18L20 18" stroke="#000000" stroke-width="2" stroke-linecap="round"/>
          <path d="M4 12L20 12" stroke="#000000" stroke-width="2" stroke-linecap="round"/>
          <path d="M4 6L20 6" stroke="#000000" stroke-width="2" stroke-linecap="round"/>

        <nav class="mobile-nav">
          <a class="nav-text" href="/" aria-current="page">Home</a>
          <a class="nav-text" href="/about.html">About Us</a>
          <a class="nav-text" href="/holidays.html">Our Holidays</a>
          <a class="nav-text is-active" href="/contact.html">Contact Us</a>
        </nav>
      </div>
    </header>

    <main class="content">
      <div class="thank-you-container">
        <h2 class="section-title">Thank you!</h2>

        <p class="paragraph-text" style="max-width: 40vw;">
          Thank you for submitting your holiday request with us! We will soon be in touch to share details of what will happen now.
        </p>
        
        <button class="return-home"><h3 class="subtitle-text"><a href="/">Return home</a></h3></button>
    </main>

    <script src="js/home.js"></script>
