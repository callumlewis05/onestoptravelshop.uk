<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>One Stop Travel Shop</title>
    <meta name="description" content="Relax, let us do the research and find you the best holiday." />
    
    <!-- General css -->
    <link rel="stylesheet" href="css/general/reset.css">
    <link rel="stylesheet" href="css/general/text.css">
    <link rel="stylesheet" href="css/general/header.css">

    <!-- Page specific css -->
    <link rel="stylesheet" href="css/pages/contact.css" />
  </head>

  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="/" aria-label="One Stop Travel Shop, home">
          <img
            class="brand-logo"
            src="img/logo.png"
            width="220"
            height="80"
            alt="One Stop Travel Shop logo"
            loading="eager"
            decoding="async"
          />
        </a>

        <nav class="site-nav" aria-label="Primary">
          <a class="nav-text" href="/">Home</a>
          <a class="nav-text" href="/about.html">About Us</a>
          <a class="nav-text" href="/holidays.html">Our Holidays</a>
          <a class="nav-text is-active" href="/contact.html">Contact Us</a>
        </nav>
      </div>
    </header>

    <main>
      <h2 class="section-title">Contact One Stop Travel Shop</h2>
      <div class="form-container">
        <form action="https://formsubmit.co/contact@callumlewis.uk" method="POST">
          <input type="hidden" name="_template" value="table">
          <input type="text" name="Name" placeholder="Name*" required>
          <input type="email" name="Email" placeholder="Email*" required>
          <input type="tel" name="Contact number" placeholder="Contact number*" required>
          <select name="Holiday type">
            <option value="">Holiday type</option>
            <option value="Beach holiday">Beach holiday</option>
            <option value="City break">City break</option>
            <option value="Cruise">Cruise</option>
            <option value="Family holiday">Family holiday</option>
            <option value="Sports break">Sports break</option>
          </select>
          <input type="number" name="Number of adults" placeholder="Number of adults*" required>
          <input type="number" name="Number of children" placeholder="Number of children*" required>
          <input type="date" name="Start date" placeholder="Start date*" required>
          <input type="date" name="End date" placeholder="End date*" required>
          <input type="text" name="Preffered destination" placeholder="Preffered destination">
          <input type="number" name="Approximate holiday budget" placeholder="Approximate holiday budget">
          <textarea name="Other details" placeholder="Other details"></textarea>
          <button type="submit">Send</button>
        </form>
      </div>
    </main>
  </body>
</html>
